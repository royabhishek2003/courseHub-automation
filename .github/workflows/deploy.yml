name: Build & Deploy to EC2

on:
  push:
    branches: [main]

env:
  DOCKERHUB_USER: royabhishek2645
  BACKEND_IMAGE: royabhishek2645/coursehub-backend
  FRONTEND_IMAGE: royabhishek2645/coursehub-frontend
  EC2_HOST: 13.206.150.216

jobs:
  lint:
    name: ESLint Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps
        working-directory: ./frontend

      - name: Run ESLint
        run: npm run lint
        working-directory: ./frontend

  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Backend Image
        run: docker build -t ${{ env.BACKEND_IMAGE }}:latest ./Server

      - name: Build Frontend Image
        run: |
          docker build \
            --build-arg VITE_BASE_URL=http://${{ env.EC2_HOST }}/api/v1 \
            --build-arg VITE_RAZORPAY_KEY=${{ secrets.VITE_RAZORPAY_KEY }} \
            -t ${{ env.FRONTEND_IMAGE }}:latest \
            ./frontend

      - name: Push Backend Image
        run: docker push ${{ env.BACKEND_IMAGE }}:latest

      - name: Push Frontend Image
        run: docker push ${{ env.FRONTEND_IMAGE }}:latest

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ env.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/coursehub
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --force-recreate
            docker image prune -f
            echo "✅ Deployment complete!"
