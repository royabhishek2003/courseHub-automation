# docker-compose.prod.yml - Use this on EC2 (pull-only, no build needed)
version: "3.8"

services:
  backend:
    image: royabhishek2645/coursehub-backend:latest
    container_name: coursehub-backend
    ports:
      - "4000:4000"
    env_file:
      - ./Server/.env
    restart: unless-stopped

  frontend:
    image: royabhishek2645/coursehub-frontend:latest
    container_name: coursehub-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
